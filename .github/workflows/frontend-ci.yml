name: Frontend CI

on:
  pull_request:
    branches: [main, master]
    paths: ['frontend/**']

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint code
        run: npm run lint

      - name: Set up test environment file
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Run tests
        run: npm run test -- --watch=false --code-coverage

      - name: Set up production environment file
        run: cp src/environments/environment.example.ts src/environments/environment.prod.ts

      - name: Build
        run: npm run build

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7
