name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2 # TODO: pin to full commit SHA — https://github.com/gitleaks/gitleaks-action/releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
