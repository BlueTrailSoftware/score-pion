name: Feature Request
description: Propose a new feature or improvement
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please:
        - Search [existing issues](../../issues) — the feature may already be proposed or in progress.
        - Read `docs/roles/` and `docs/flows/` to understand the current intended behavior.
        - **Do not begin implementation until the issue is labeled `accepted`.**

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem or limitation you are facing. Focus on the *why*, not the solution.
      placeholder: As a recruiter, I cannot filter applicants by assessment score, which forces me to manually review all submissions.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution. Be specific about the expected behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why did you prefer the proposed solution?

  - type: dropdown
    id: area
    attributes:
      label: Area Affected
      description: Which part of the application would this change?
      options:
        - Backend only
        - Frontend only
        - Both (API contract change)
        - Infrastructure / DevOps
        - Documentation
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links to related issues, designs, or external references.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I understand implementation should not start until this is labeled `accepted`.
          required: true
