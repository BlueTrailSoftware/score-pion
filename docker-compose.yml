version: "3.9"

# Score Pion — Full Stack Docker Compose
#
# Environment Variables:
#   Backend & Infrastructure: .env (root)
#   Frontend (build-time):    .frontend.env (frontend/)
#
# See ENVIRONMENT_VARIABLES.md for details
#

services:
  backend:
    build: ./backend
    ports:
      - "7070:7070"
    env_file: .env
    environment:
      - AWS_DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_S3_FORCE_PATH_STYLE=true
      - AWS_S3_FILES_ENDPOINT=http://localhost:9000/score-pion-files
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - CODERBYTE_API_TOKEN=${CODERBYTE_API_TOKEN}
      - TICKET_MANAGER_TOKEN=${TICKET_MANAGER_TOKEN}
      - GCHAT_INTERNAL_WEBHOOK_URL=${GCHAT_INTERNAL_WEBHOOK_URL}
      - GCHAT_EXTERNAL_WEBHOOK_URL=${GCHAT_EXTERNAL_WEBHOOK_URL}
    depends_on:
      init-dynamodb:
        condition: service_completed_successfully
      create-buckets:
        condition: service_completed_successfully
    networks:
      - scorepion-network

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - scorepion-network

  dynamodb-local:
    container_name: scorepion-dynamodb-local
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/ -o /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - scorepion-network

  init-dynamodb:
    image: amazon/aws-cli
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-awsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-awsadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --region us-east-1 \
          --table-name scorepion-data \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
            AttributeName=GSI2PK,AttributeType=S \
            AttributeName=GSI2SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"GSI2","KeySchema":[{"AttributeName":"GSI2PK","KeyType":"HASH"},{"AttributeName":"GSI2SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          || true
        echo "DynamoDB table ready."
    networks:
      - scorepion-network

  dynamodb-admin:
    container_name: scorepion-dynamodb-admin
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-awsadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-awsadmin}
    depends_on:
      - dynamodb-local
    networks:
      - scorepion-network

  minio:
    container_name: scorepion-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-awsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-awsadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - scorepion-network

  create-buckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-awsadmin} ${MINIO_ROOT_PASSWORD:-awsadmin};
      /usr/bin/mc mb myminio/score-pion-files;
      /usr/bin/mc anonymous set download myminio/score-pion-files;
      exit 0;
      "
    networks:
      - scorepion-network

  mailpit:
    container_name: scorepion-mailpit
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - scorepion-network

networks:
  scorepion-network:
    driver: bridge

volumes:
  minio_data:
    driver: local