<div class="privacy-container">
  <div class="privacy-card">
    <div class="privacy-header">
      <div class="header-icon primary">
        <i class="bi bi-download"></i>
      </div>
      <h1 class="privacy-title primary">Download My Data</h1>
      <p class="privacy-subtitle">Request a copy of your personal information</p>
    </div>

    <div class="info-card">
      <div class="info-card-icon">
        <i class="bi bi-info-circle"></i>
      </div>
      <div class="info-card-content">
        <strong>Info:</strong> You'll receive a link to download your data in JSON format.
      </div>
    </div>

    <form
      [formGroup]="requestForm"
      (ngSubmit)="onSubmit()"
      class="privacy-form"
    >
      <div class="mb-4">
        <label
          for="email"
          class="form-label"
          >Email Address</label
        >
        <input
          type="email"
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
        />
        <div class="form-text"> We'll send a download link to this email address. </div>
      </div>

      @if (success) {
        <div class="success-card">
          <i class="bi bi-check-circle-fill me-2"></i>
          Download link sent! Please check your inbox.
        </div>
      }

      @if (error) {
        <div
          class="alert alert-danger"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ error }}
        </div>
      }

      <div class="privacy-actions">
        <button
          type="submit"
          class="btn btn-gradient-primary btn-lg"
          [disabled]="requestForm.invalid || loading"
        >
          @if (loading) {
            <span
              class="spinner-border spinner-border-sm me-2"
              role="status"
            ></span>
            Sending...
          } @else {
            <i class="bi bi-send me-2"></i>
            Request Data Download
          }
        </button>
      </div>
    </form>
  </div>
</div>
