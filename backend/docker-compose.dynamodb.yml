version: '3.8'

services:
  dynamodb-local:
    container_name: scorepion-dynamodb-local
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - scorepion-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dynamodb-admin:
    container_name: scorepion-dynamodb-admin
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
    depends_on:
      - dynamodb-local
    networks:
      - scorepion-network

  minio:
    container_name: scorepion-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: awsadmin
      MINIO_ROOT_PASSWORD: awsadmin
      MINIO_DEFAULT_BUCKETS: "scorepion-uploads,temp"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - scorepion-network

  create-buckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 awsadmin awsadmin;
      /usr/bin/mc mb myminio/score-pion-files;
      /usr/bin/mc anonymous set download myminio/score-pion-files;
      exit 0;
      "
    networks:
      - scorepion-network

networks:
  scorepion-network:
    driver: bridge

volumes:
  minio_data:
    driver: local
