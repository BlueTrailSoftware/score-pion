cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Data Retention Configuration (GDPR compliance)
applicant.data.retention.months=9

# Automatic data cleanup scheduler
data.retention.scheduler.enabled=true
data.retention.scheduler.cron=0 0 2 * * *

# Timeouts
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Configuration
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=${EMAIL_FROM}
app.email.from-name=${EMAIL_FROM_NAME}

coderbyte.baseUrl=https://coderbyte.com/api
coderbyte.apiToken=${CODERBYTE_API_TOKEN}
gchat.internal.webhookUrl=${GCHAT_INTERNAL_WEBHOOK_URL}
gchat.external.webhookUrl=${GCHAT_EXTERNAL_WEBHOOK_URL}

server.port=7070

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}

# Auth0 Configuration
auth0.domain=${AUTH0_DOMAIN}
auth0.client-id=${AUTH0_CLIENT_ID}
auth0.client-secret=${AUTH0_CLIENT_SECRET}
auth0.redirect-uri=${AUTH0_REDIRECT_URI}
auth0.require-email-verification=${AUTH0_REQUIRE_EMAIL_VERIFICATION}
auth0.webhook-secret=${AUTH0_WEBHOOK_SECRET}

# Frontend URL
frontend.url=${FRONTEND_URL}

# Google reCAPTCHA v3
recaptcha.site.key=${RECAPTCHA_SITE_KEY}
recaptcha.secret.key=${RECAPTCHA_SECRET_KEY}
recaptcha.verification.url=https://www.google.com/recaptcha/api/siteverify
recaptcha.min.score=0.5

# Admin Configuration
admin.email=${ADMIN_EMAIL}

# Ticket-manager (Asana integration)
ticket.manager.token=${TICKET_MANAGER_TOKEN}
ticket.manager.project-id=${TICKET_MANAGER_PROJECT_ID}
ticket.manager.workspace-id=${TICKET_MANAGER_WORKSPACE_ID}
ticket.manager.api-url=${TICKET_MANAGER_API_URL}

# DynamoDB Configuration
aws.region=${AWS_REGION}
aws.dynamodb.endpoint=${AWS_DYNAMODB_ENDPOINT}
aws.access-key-id=${AWS_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}

aws.s3.files.endpoint=${AWS_S3_FILES_ENDPOINT}
aws.s3.endpoint=${AWS_ENDPOINT_URL_S3}
aws.s3.path-style-access=${AWS_S3_FORCE_PATH_STYLE}
dynamodb.table.name=scorepion-data

# Files configuration
spring.webflux.multipart.max-file-size=10MB
spring.webflux.multipart.max-request-size=10MB
spring.webflux.multipart.file-size-threshold=2KB
server.max-http-request-header-size=8192

aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true